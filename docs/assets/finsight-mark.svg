<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="FinSight logo">
  <defs>
    <linearGradient id="fsTile" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1aa9b3"/>
      <stop offset="1" stop-color="#0c5f68"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="96" height="96" rx="22" fill="url(#fsTile)"/>
  <!-- magnifying lens -->
  <circle cx="42" cy="42" r="21" fill="none" stroke="#ffffff" stroke-width="5.5"/>
  <!-- handle -->
  <line x1="58" y1="58" x2="74" y2="74" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <!-- rising chart line inside the lens -->
  <polyline points="30,49 37,42 44,45 53,33" fill="none" stroke="#ffffff" stroke-width="3.4"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="53" cy="33" r="2.6" fill="#ffffff"/>
</svg>
