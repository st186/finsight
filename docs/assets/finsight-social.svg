<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="FinSight — agentic financial research over SEC filings">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1b20"/>
      <stop offset="1" stop-color="#08343a"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25c3ce"/>
      <stop offset="1" stop-color="#0f7580"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- faint chart grid motif -->
  <g stroke="#1c4a52" stroke-width="1" opacity="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>
  <polyline points="820,470 900,430 980,450 1060,360 1140,300 1220,250" fill="none"
            stroke="#12868f" stroke-width="4" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- icon tile -->
  <g transform="translate(110,150)">
    <rect x="0" y="0" width="150" height="150" rx="34" fill="url(#tile)"/>
    <circle cx="65.6" cy="65.6" r="32.8" fill="none" stroke="#ffffff" stroke-width="8.5"/>
    <line x1="90.6" y1="90.6" x2="115.6" y2="115.6" stroke="#ffffff" stroke-width="12.5" stroke-linecap="round"/>
    <polyline points="46.9,76.6 57.8,65.6 68.8,70.3 82.8,51.6" fill="none" stroke="#ffffff" stroke-width="5.3"
              stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="82.8" cy="51.6" r="4" fill="#ffffff"/>
  </g>

  <!-- wordmark -->
  <text x="300" y="250" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="104" font-weight="800">
    <tspan fill="#eaf1f2">Fin</tspan><tspan fill="#3fc4cf">Sight</tspan>
  </text>
  <text x="304" y="312" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="34" font-weight="500" fill="#9fb4bb">
    Agentic financial research over SEC filings
  </text>

  <!-- value props -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="600">
    <g transform="translate(110,430)">
      <rect x="0" y="0" width="330" height="120" rx="16" fill="#10262b" stroke="#1c4a52"/>
      <text x="24" y="48" fill="#3fc4cf">Cite or refuse</text>
      <text x="24" y="86" fill="#9fb4bb" font-size="19" font-weight="400">every claim traces to a filing</text>
    </g>
    <g transform="translate(475,430)">
      <rect x="0" y="0" width="330" height="120" rx="16" fill="#10262b" stroke="#1c4a52"/>
      <text x="24" y="48" fill="#3fc4cf">Measured retrieval</text>
      <text x="24" y="86" fill="#9fb4bb" font-size="19" font-weight="400">86% hit rate · 0.91 faithful</text>
    </g>
  </g>

  <text x="110" y="600" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#5f767d">
    RAG · LangGraph agents · Azure OpenAI · pgvector — github.com/st186/finsight
  </text>
</svg>
